<head>

<title>MundialBet Club 2026 — Web</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
:root {
  --font-display: 'Bricolage Grotesque', system-ui, sans-serif;
  --font-body:    'Manrope', system-ui, -apple-system, sans-serif;
  --font-mono:    'JetBrains Mono', ui-monospace, Menlo, monospace;
  --bg:#0A0F1C; --surface-1:#111827; --surface-2:#1E2A3A; --surface-3:#243449; --border:#1E2A3A; --border-2:#30363D;
  --mex:#00843D; --mex-light:#00C85A; --can:#D40020; --can-light:#E84040; --usa:#003DA5; --usa-light:#4A90E2;
  --gold:#D4AF37; --gold-light:#F0CE5A;
  --text:#E5E7EB; --muted:#97A1B0; --muted-2:#6B7280; --muted-3:#4B5563;
  --success:var(--mex-light); --success-bg:rgba(0,200,90,0.12); --danger:var(--can-light); --danger-bg:rgba(232,64,64,0.12);
  --info:var(--usa-light); --info-bg:rgba(74,144,226,0.12); --coin:var(--gold); --coin-bg:rgba(212,175,55,0.12);
  --t-3xs:11px; --t-2xs:12px; --t-xs:13px; --t-sm:14px; --t-md:15px; --t-lg:17px; --t-xl:20px; --t-2xl:24px;
  --t-3xl:30px; --t-4xl:38px; --t-5xl:48px; --t-6xl:64px;
  --sp-1:4px; --sp-2:8px; --sp-3:12px; --sp-4:16px; --sp-5:20px; --sp-6:24px; --sp-8:32px; --sp-10:40px; --sp-12:48px; --sp-16:64px;
  --r-xs:4px; --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-2xl:28px; --r-pill:9999px;
  --sh-1:0 1px 2px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.04);
  --sh-2:0 4px 12px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
  --sh-3:0 10px 28px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  --sh-4:0 20px 48px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.06);
  --glow-gold:0 0 0 1px rgba(212,175,55,0.5), 0 0 20px rgba(212,175,55,0.25);
  --glow-green:0 0 0 1px rgba(0,200,90,0.5), 0 0 18px rgba(0,200,90,0.22);
  --ease-out:cubic-bezier(0.22,1,0.36,1); --ease-spring:cubic-bezier(0.34,1.56,0.64,1);
  --dur-fast:140ms; --dur-base:220ms; --dur-slow:380ms;
}
* { box-sizing: border-box; }
html, body { margin:0; padding:0; background:#06080F; font-family:var(--font-body); color:var(--text);
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
#stage { min-height:100vh; }
.display { font-family:var(--font-display); font-weight:700; letter-spacing:-0.02em; line-height:1.05; }
.num { font-family:var(--font-display); font-feature-settings:"tnum" 1, "lnum" 1; font-weight:700; letter-spacing:-0.01em; }
.mono { font-family:var(--font-mono); font-feature-settings:"tnum" 1; }
.eyebrow { font-family:var(--font-body); font-weight:700; text-transform:uppercase; letter-spacing:0.1em; font-size:var(--t-3xs); }
*::-webkit-scrollbar { width:8px; height:8px; }
*::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:8px; }
.mb-app-bg {
  background:
    linear-gradient(180deg, rgba(6,14,9,0.45) 0%, rgba(6,14,9,0.06) 20%, rgba(6,14,9,0.00) 55%, rgba(5,11,7,0.18) 100%),
    url(stadium.jpg) center 60% / cover no-repeat;
  background-color:#0c2114;
}
.mb-main-pitch {
  background:
    linear-gradient(180deg, rgba(6,14,9,0.34) 0%, rgba(6,14,9,0.04) 22%, rgba(6,14,9,0.00) 55%, rgba(5,11,7,0.14) 100%),
    url(stadium.jpg) center 56% / cover fixed no-repeat;
  background-color:#0c2114;
}
@keyframes mb-fade-up { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
@keyframes mb-pop { 0% { transform:scale(0.9); opacity:0; } 60% { transform:scale(1.04); } 100% { transform:scale(1); opacity:1; } }
@keyframes mb-pulse-live { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.35; transform:scale(0.8); } }
@keyframes mb-pulse-tick { 0% { transform:scale(1.12); } 100% { transform:scale(1); } }
@keyframes mb-bounce { 0%,100% { transform:translateY(0); } 25% { transform:translateY(-14px); } 50% { transform:translateY(0); } 75% { transform:translateY(-7px); } }
@keyframes mb-sag { 0% { transform:translateY(0) rotate(0); } 100% { transform:translateY(4px) rotate(-6deg); } }
@keyframes mb-spin360 { from { transform:rotateY(0); } to { transform:rotateY(360deg); } }
@keyframes mb-glow-breathe { 0%,100% { box-shadow:var(--glow-gold); } 50% { box-shadow:0 0 0 1px rgba(212,175,55,0.6), 0 0 28px rgba(212,175,55,0.4); } }
@media (prefers-reduced-motion: reduce) { * { animation-duration:0.001ms !important; animation-iteration-count:1 !important; } }
</style>
</head>
